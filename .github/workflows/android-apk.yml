name: Android APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android-apk:
    name: Build Android APK
    runs-on: macos-15
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restore release signing key
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: bash
        run: |
          mkdir -p release android
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release/labbuddy-release.jks
          cat > android/key.properties <<PROPS
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=../../release/labbuddy-release.jks
          PROPS

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test test/widget_test.dart

      - name: Build APK
        run: flutter build apk --release

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p build/release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk build/release-artifacts/LabBuddy-${GITHUB_REF_NAME:-manual}.apk
          shasum -a 256 build/release-artifacts/LabBuddy-${GITHUB_REF_NAME:-manual}.apk > build/release-artifacts/LabBuddy-${GITHUB_REF_NAME:-manual}.apk.sha256

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LabBuddy-Android-APK
          path: |
            android/build/release-artifacts/*.apk
            android/build/release-artifacts/*.sha256

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/build/release-artifacts/*.apk
            android/build/release-artifacts/*.sha256
          body: |
            LabBuddy Android APK release.

            Demo login:
            - Email: demo@labbuddy.app
            - Password: labbuddy2026

            This APK runs in local demo mode. No server login is required.
